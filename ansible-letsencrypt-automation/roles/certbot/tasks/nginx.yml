---
- name: Ensure NGINX snippets directory exists
  ansible.builtin.file:
    path: "{{ nginx_ssl_snippet_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy strong SSL configuration
  ansible.builtin.template:
    src: ssl.conf.j2
    dest: "{{ nginx_ssl_snippet_path }}"
    owner: root
    group: root
    mode: "0644"
    validate: "nginx -t -c /etc/nginx/nginx.conf"
  notify: reload nginx
