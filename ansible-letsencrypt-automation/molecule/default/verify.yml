---
- name: Verify
  hosts: all
  become: true

  tasks:
    - name: Certbot binary is installed
      ansible.builtin.command: certbot --version
      changed_when: false

    - name: SSL snippet was deployed
      ansible.builtin.stat:
        path: "{{ nginx_ssl_snippet_path | default('/etc/nginx/snippets/ssl.conf') }}"
      register: ssl_snippet

    - name: Assert SSL snippet exists
      ansible.builtin.assert:
        that:
          - ssl_snippet.stat.exists
        fail_msg: "Expected SSL snippet was not deployed"

    - name: Renewal cron job is present
      ansible.builtin.command: crontab -l
      register: crontab_out
      changed_when: false
      failed_when: "'certbot renew' not in crontab_out.stdout"
